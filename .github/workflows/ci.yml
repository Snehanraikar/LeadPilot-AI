name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-lint-test:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: leadpilot
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: leadpilot_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://leadpilot:secret@localhost:5432/leadpilot_test
        run: npx prisma migrate deploy

      - name: Run tests with coverage
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://leadpilot:secret@localhost:5432/leadpilot_test
          JWT_ACCESS_SECRET: test_access_secret_min_32_chars_ok
          JWT_REFRESH_SECRET: test_refresh_secret_min_32_chars_ok
          JWT_ACCESS_EXPIRES_IN: 15m
          JWT_REFRESH_EXPIRES_IN: 7d
          API_BASE_URL: http://localhost:4000
          FRONTEND_URL: http://localhost:3000
          AI_PROVIDER: openai
        run: npm run test:coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          directory: backend/coverage
          fail_ci_if_error: false

  frontend-lint-build:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/api
          NEXT_PUBLIC_POSTHOG_KEY: dummy
        run: npm run build

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-lint-test, frontend-lint-build]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t leadpilot-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t leadpilot-frontend:ci ./frontend
